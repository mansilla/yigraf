[project]
name = "yigraf"
version = "0.0.0"
description = "A harness primitive for AI coding agents: one connected graph over code, intent, plan, and memory — legible (token-cheap retrieval) and enforceable (intent↔code drift checks)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "typer>=0.12",
    "pyyaml>=6.0",
    "networkx>=3.4",
    # M1 structure index. Core (not an extra): the structure graph is foundational.
    # Pin core + grammar to the same minor for ABI alignment (see docs/m1-notes.md §1).
    # Python-only for v0; multi-language grammars come post-v0 (BUILD-PLAN sequencing).
    "tree-sitter>=0.23,<0.25",
    "tree-sitter-python>=0.23,<0.25",
]

[project.optional-dependencies]
# Scoped semantic recall over memory+intent (M8, docs/retrieval-design.md §10). Optional by design:
# with this extra uninstalled, retrieval degrades gracefully to the lexical/IDF seeder (= v0).
# numpy is the brute-force cosine index; sentence-transformers is the default local bge-small backend.
embeddings = [
    "numpy>=1.24",
    "sentence-transformers>=2.2",
]

[project.scripts]
yigraf = "yigraf.cli:main"

[dependency-groups]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/yigraf"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
